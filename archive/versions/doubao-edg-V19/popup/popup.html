<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豆包去水印</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">

    <!-- 标题 -->
    <div class="popup-header">
      <h1>🫧 豆包去水印</h1>
      <span class="version">v1.5.0</span>
    </div>

    <!-- 输入区 -->
    <div class="input-section">
      <textarea id="urlInput" placeholder="粘贴豆包/通义千问/即梦链接..." rows="3"></textarea>
      <div class="btn-row">
        <button id="extractBtn" class="btn btn-primary">🔍 解析</button>
        <button id="pasteBtn" class="btn btn-secondary">📋 粘贴</button>
        <button id="currentBtn" class="btn btn-secondary">📄 当前页</button>
        <button id="clearBtn" class="btn btn-ghost">清空</button>
      </div>
    </div>

    <!-- 自动提取 -->
    <div class="auto-extract">
      <label>
        <input type="checkbox" id="autoExtract">
        <span>粘贴/获取页面时自动解析</span>
      </label>
    </div>

    <!-- 加载中 -->
    <div id="loadingSection" class="loading-section">
      <div class="spinner"></div>
      <span id="loadingText">正在解析...</span>
    </div>

    <!-- 错误提示 -->
    <div id="errorSection" class="error-section">
      <span id="errorText"></span>
    </div>

    <!-- 结果区 -->
    <div id="resultSection" class="result-section">

      <!-- 标签选择 -->
      <div class="tabs">
        <div class="tab active" data-tab="content">内容</div>
        <div class="tab" data-tab="cover">封面</div>
        <div class="tab" data-tab="desc">文案</div>
      </div>

      <!-- 内容面板 -->
      <div id="contentPanel" class="tab-content active">
        <!-- 类型标签 -->
        <div class="type-tag">
          <span id="tabContent">视频</span>
        </div>

        <!-- 视频面板 -->
        <div id="videoPanel" class="media-panel">
          <video id="videoPlayer" controls></video>
          <div id="videoMeta" class="media-meta"></div>
        </div>

        <!-- 图集面板 -->
        <div id="imagesPanel" class="media-panel">
          <div class="images-header">
            <span id="imagesCount">共 0 张</span>
            <button id="selectAllBtn" class="btn btn-sm">全选</button>
          </div>
          <div id="imagesGrid" class="images-grid"></div>
        </div>
      </div>

      <!-- 封面面板 -->
      <div id="coverPanel" class="tab-content">
        <img id="coverImage" class="cover-preview" alt="封面">
      </div>

      <!-- 文案面板 -->
      <div id="descPanel" class="tab-content">
        <p id="descText" class="desc-text">暂无文案</p>
      </div>

    </div>

    <!-- 操作区 -->
    <div id="videoActions" class="action-bar" style="display:none">
      <button id="downloadBtn" class="btn btn-primary">⬇ 下载视频</button>
      <button id="copyLinkBtn" class="btn btn-secondary">📋 复制链接</button>
    </div>

    <div id="imageActions" class="action-bar" style="display:none">
      <button id="downloadSelectedBtn" class="btn btn-primary">⬇ 下载选中</button>
      <button id="downloadAllImagesBtn" class="btn btn-secondary">⬇ 下载全部</button>
    </div>

    <div id="coverActions" class="action-bar" style="display:none">
      <button id="downloadCoverBtn" class="btn btn-primary">⬇ 下载封面</button>
    </div>

    <div id="descActions" class="action-bar" style="display:none">
      <button id="copyDescBtn" class="btn btn-secondary">📋 复制文案</button>
    </div>

    <!-- 平台说明 -->
    <div class="platform-note">
      <span>支持：豆包视频/图集 · 通义千问 · 即梦</span>
    </div>

  </div>
  <script src="../utils/api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
