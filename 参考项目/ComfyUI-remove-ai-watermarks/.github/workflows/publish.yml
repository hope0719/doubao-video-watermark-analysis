name: Publish to Comfy registry

# Auto-publishes the node package to the ComfyUI Registry whenever its version
# is bumped in pyproject.toml on the default branch. The node package has its
# OWN version (independent of the library), so this fires on a node change, not
# on a library release. Requires the COMFY_REGISTRY_TOKEN repo secret (a Comfy
# registry API key from registry.comfy.org).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - pyproject.toml

jobs:
  publish-node:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Publish custom node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.COMFY_REGISTRY_TOKEN }}
